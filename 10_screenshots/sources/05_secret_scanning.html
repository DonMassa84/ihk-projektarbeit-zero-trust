<!DOCTYPE html><html><head><meta charset="utf-8"><title>Secret Scanning</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;margin:0;padding:20px;background:#0d1117;color:#e6edf3}
h3{font-size:15px;margin:0 0 16px 0}.alerts{background:#161b22;border:1px solid #30363d;border-radius:6px}
.alert{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #30363d}
.alert:last-child{border-bottom:none}.alert .severity{font-size:12px;padding:2px 8px;border-radius:10px}
.sev-critical{background:#f8514922;color:#f85149;border:1px solid #f8514944}
.sev-high{background:#d2992222;color:#d29922;border:1px solid #d2992244}
.sev-none{background:#3fb95022;color:#3fb950;border:1px solid #3fb95044}
.summary{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:16px;margin-top:16px;display:flex;gap:20px}
.summary-item{text-align:center;flex:1}.summary-item .num{font-size:28px;font-weight:700}
.summary-item .num.green{color:#3fb950}.summary-item .label{font-size:12px;color:#8b949e}
</style></head><body>
<h3>🔒 GitHub Advanced Security – Secret Scanning</h3>
<div class="summary">
<div class="summary-item"><div class="num green">0</div><div class="label">Critical</div></div>
<div class="summary-item"><div class="num green">0</div><div class="label">High</div></div>
<div class="summary-item"><div class="num green">0</div><div class="label">Medium</div></div>
<div class="summary-item"><div class="num green">2</div><div class="label">Low (test tokens)</div></div>
</div>
<div class="alerts">
<div class="alert"><span>README.md: dummy API token in example</span><span class="severity sev-none">Low – false positive</span></div>
<div class="alert"><span>.env.example: placeholder secret key</span><span class="severity sev-none">Low – placeholder</span></div>
</div>
</body></html>
