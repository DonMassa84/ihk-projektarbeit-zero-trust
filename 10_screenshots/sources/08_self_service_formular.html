<!DOCTYPE html><html><head><meta charset="utf-8"><title>Self-Service</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;margin:0;padding:20px;background:#f0f2f5;color:#1f2328}
.form{max-width:600px;margin:0 auto;background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:24px;box-shadow:0 1px 3px #00000022}
h3{font-size:18px;margin:0 0 20px 0;color:#1f2328}label{display:block;font-size:14px;font-weight:600;margin:0 0 4px 0;color:#1f2328}
select,input[type=text],textarea{width:100%;padding:8px 12px;border:1px solid #d0d7de;border-radius:6px;font-size:14px;margin-bottom:16px;box-sizing:border-box}
textarea{height:80px}.btn{background:#1f6feb;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#1f6febdd}.info{background:#ddf4ff;border:1px solid #54aeff66;border-radius:6px;padding:12px;margin-bottom:16px;font-size:13px;color:#0550ae}
</style></head><body>
<div class="form">
<h3>🛂 Rollenantrag stellen</h3>
<div class="info">🔍 Ihre aktuelle Rolle: <strong>Read-Only</strong> – Sie können folgende Rollen beantragen:</div>
<label for="rolle">Gewünschte Rolle</label>
<select id="rolle"><option>Bitte wählen...</option><option>Developer (Zugriff: Push/Pull, Issues)</option><option>Auditor (Zugriff: Audit-Logs lesen)</option><option>HR-Manager (Zugriff: Personalbereich)</option></select>
<label for="begruendung">Begründung</label><textarea id="begruendung" placeholder="Bitte erläutern Sie den geschäftlichen Bedarf..."></textarea>
<label for="manager">Genehmigender Vorgesetzter</label>
<select id="manager"><option>Bitte wählen...</option><option>Petra Klein (HR-Leitung)</option><option>Thomas Zoller (IT-Leitung)</option></select>
<button class="btn">Antrag einreichen</button>
</div>
</body></html>
