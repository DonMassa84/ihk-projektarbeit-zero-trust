<!DOCTYPE html><html><head><meta charset="utf-8"><title>$title$</title>
<style>
@page{
  size:A4;
  margin:2.5cm 2cm 2.5cm 2.5cm;
  @bottom-center{content:counter(page);font-family:Arial;font-size:10pt;color:#333}
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  font-size:12pt;
  line-height:1.5;
  color:#000;
  text-align:left;
  widows:2;orphans:2
}
h1{font-size:20pt;margin-top:24pt;margin-bottom:12pt;page-break-before:always;page-break-after:avoid}
h2{font-size:16pt;margin-top:18pt;margin-bottom:10pt;page-break-after:avoid}
h3{font-size:14pt;margin-top:14pt;margin-bottom:8pt;page-break-after:avoid}
h4{font-size:12pt;margin-top:12pt;margin-bottom:6pt;page-break-after:avoid}
p{margin-bottom:6pt;text-align:left}
ul,ol{margin-left:18pt;margin-bottom:6pt}
li{margin-bottom:3pt}
table{width:100%;border-collapse:collapse;margin:10pt 0;font-size:10pt}
table th{background:#f0f0f0;padding:4pt 6pt;border:1px solid #999;text-align:left;font-weight:bold}
table td{padding:4pt 6pt;border:1px solid #999;vertical-align:top}
pre,code{font-family:'Courier New',monospace;font-size:10pt;background:#f5f5f5;padding:2pt 4pt}
pre{padding:8pt;margin:8pt 0;border:1px solid #ddd;overflow-x:auto;white-space:pre-wrap}
blockquote{border-left:3pt solid #999;padding-left:10pt;margin:8pt 0;font-style:italic;color:#555}
.page-break{page-break-before:always}
.toc{margin:20pt 0}.toc ul{list-style:none;margin-left:0}
.toc li{margin:4pt 0;font-size:12pt}
.toc .l2{margin-left:20pt;font-size:11pt}
.toc .l3{margin-left:40pt;font-size:10pt}
.cover-page{text-align:center;padding-top:8cm;page-break-after:always}
.cover-page h1{font-size:24pt;margin-bottom:20pt;page-break-before:avoid}
.cover-page h2{font-size:18pt;font-weight:normal;margin-bottom:40pt;page-break-before:avoid}
.cover-page .info{margin-top:60pt;font-size:12pt;line-height:2}
.cover-page .info strong{display:inline-block;min-width:120pt}
img{max-width:100%;height:auto;margin:10pt 0}
figure{margin:10pt 0;text-align:center}
figcaption{font-size:10pt;font-style:italic;margin-top:4pt}
</style></head><body>
$body$
</body></html>
