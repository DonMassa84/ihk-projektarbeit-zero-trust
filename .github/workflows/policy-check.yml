name: Secret Scanning & Policy Check

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, develop]

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --results=verified,unknown --fail

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OPA Policy Check
        uses: docker://openpolicyagent/opa:latest
        with:
          args: eval --data policies/ --input ${{ github.workspace }}.github/workflows/ "data.zero_trust.policies.allow"

      - name: Compliance Check
        run: |
          echo "Checking compliance requirements..."
          if [ -f "policies/compliance.rego" ]; then
            opa eval --data policies/ --input .github/ "data.zero_trust.compliance"
          fi

  security-report:
    needs: [secret-scanning, policy-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Security Report
        run: |
          echo "## Zero-Trust Security Check Report" > security-report.md
          echo "### Secret Scanning: ${{ needs.secret-scanning.result }}" >> security-report.md
          echo "### Policy Check: ${{ needs.policy-check.result }}" >> security-report.md
          echo "" >> security-report.md
          echo "_Generated by Zero-Trust GitHub Actions Pipeline_" >> security-report.md

      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md