name: RBAC Auto-Provisioning
on:
  workflow_dispatch:
    inputs:
      user:
        description: 'GitHub Username'
        required: true
        type: string
      role:
        description: 'Role to assign'
        required: true
        type: string
      action:
        description: 'grant or revoke'
        required: true
        default: 'grant'
        type: choice
        options:
          - grant
          - revoke
  pull_request:
    types: [closed]
    paths:
      - '.github/roles/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.policy-check.outputs.valid }}
    steps:
      - uses: actions/checkout@v4
      - name: Policy Validation
        id: policy-check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            USER="${{ inputs.user }}"
            ROLE="${{ inputs.role }}"
            ACTION="${{ inputs.action }}"
          else
            echo "Using PR context"
            USER=""
            ROLE=""
            ACTION=""
          fi
          echo "valid=true" >> $GITHUB_OUTPUT

  provision:
    needs: validate
    if: needs.validate.outputs.valid == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        id: add-collaborator
        with:
          script: |
            const { user, role, action } = ${{ toJSON(inputs) }};

            if (action === 'grant') {
              await github.rest.repos.addCollaborator({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: user,
                permission: role === 'admin' ? 'admin' :
                           role === 'write' ? 'push' : 'pull'
              });
              core.setOutput('status', 'granted');
              core.setOutput('message', `Granted ${role} access to ${user}`);
            } else {
              await github.rest.repos.removeCollaborator({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: user
              });
              core.setOutput('status', 'revoked');
              core.setOutput('message', `Revoked access for ${user}`);
            }

  audit:
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - name: Create Audit Log Entry
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"timestamp\":\"$TIMESTAMP\",\"action\":\"${{ inputs.action }}\",\"user\":\"${{ inputs.user }}\",\"role\":\"${{ inputs.role }}\",\"workflow\":\"${{ github.run_id }}\",\"status\":\"${{ needs.provision.outputs.status }}\"}" >> audit.log