name: CI – Zero-Trust Pilot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy aiosqlite httpx pydantic pydantic-settings structlog pytest pytest-asyncio

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Test with pytest
        run: |
          cd src/backend && python -m pytest ../../tests/ -v --tb=short

      - name: Security scan – bandit
        run: |
          pip install bandit
          bandit -r src/ -f json -o reports/security/bandit_report.json || true
        continue-on-error: true

      - name: Security scan – trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
        continue-on-error: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.python-version }}
          path: |
            reports/
            .pytest_cache/

      - name: Summary
        run: |
          echo "CI passed for Python ${{ matrix.python-version }}"
